version: 2

sources:
  - name: jaffle_shop
    description: A clone of a Postgres application database.
    database: raw
    schema: jaffle_shop
    loaded_at_field: _etl_loaded_at
    freshness:
      warn_after: { count: 10, period: day }
      error_after: { count: 15, period: day }
    tables:
      - name: customers
        description: Raw customers data.
        freshness: null
        columns:
          - name: id
            description: Primary key.
            data_tests:
              - unique
              - not_null
      - name: orders
        description: Raw orders data.
        columns:
          - name: id
            description: Primary key.
            data_tests:
              - unique
              - not_null

models:
  - name: stg_jaffle_shop__customers
    description: Staged customer data from jaffle shop app. One unique customer per row.
    columns:
      - name: customer_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    description: Staged order data from jaffle shop app. One order per row.
    columns:
      - name: order_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers.customer_id.
        data_tests:
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              values:
                - completed
                - placed
                - return_pending
                - returned
                - shipped
